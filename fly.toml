# fly.toml app configuration file generated for tsfinancialsystem on 2026-06-15T14:18:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tsfinancialsystem'
primary_region = 'nrt'

[build]

[env]
  DATA_DIR = '/data'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
